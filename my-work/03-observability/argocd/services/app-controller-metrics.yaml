apiVersion: v1
kind: Service
metadata:
  name: argocd-application-controller-metrics
  namespace: argocd
  labels:
    app: argocd-application-controller-metrics
  
  
spec:
  type: ClusterIP
  ports:
  - name: http-metrics
    port: 8082
    protocol: TCP
    targetPort: metrics
    
  selector:
    app.kubernetes.io/instance: argocd
    app.kubernetes.io/name: argocd-application-controller
    
status:
  loadBalancer: {}