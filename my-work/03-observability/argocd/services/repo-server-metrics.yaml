apiVersion: v1
kind: Service
metadata:
  name: argocd-repo-server-metrics
  namespace: argocd
  labels:
    app: argocd-repo-server-metrics
  
spec:
  type: ClusterIP
  
  ports:
  - name: http-metrics
    port: 8084
    protocol: TCP
    targetPort: metrics
    
  selector:
    app.kubernetes.io/instance: argocd
    app.kubernetes.io/name: argocd-repo-server
  
status:
  loadBalancer: {}