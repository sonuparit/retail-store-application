apiVersion: v1
kind: Service
metadata:
  name: argocd-applicationset-controller-metrics
  namespace: argocd
  labels:
    app: argocd-applicationset-controller-metrics
  
spec:
  type: ClusterIP
  
  ports:
  - name: http-metrics
    port: 8080
    protocol: TCP
    targetPort: metrics
    
  selector:
    app.kubernetes.io/instance: argocd
    app.kubernetes.io/name: argocd-applicationset-controller

status:
  loadBalancer: {}