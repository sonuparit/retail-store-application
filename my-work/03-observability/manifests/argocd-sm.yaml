apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-sm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  
spec:
  project: observability
  source:
    repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
    path: my-work/03-observability/argocd/service-monitors/
    targetRevision: main
    
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
    
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]