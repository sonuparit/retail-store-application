apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-metrics-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  
spec:
  project: observability
  source:
    repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
    path: my-work/03-observability/argocd/services/
    targetRevision: main
    
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
    
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]