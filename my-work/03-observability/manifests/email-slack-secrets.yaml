apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: email-slack-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  
spec:
  project: observability
  source:
    repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
    path: my-work/03-observability/alertmanager/secrets
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
    
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]